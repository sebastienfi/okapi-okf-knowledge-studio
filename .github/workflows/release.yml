name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # npm trusted publishing (OIDC, via the id-token permission) needs
      # npm >= 11.5.1; the Node 22 runner image ships npm 10.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Opens/updates a "Version Packages" PR; on merge, publishes to npm.
      # Custom version command: changesets rewrites package.json in its own
      # style, so re-format before committing or the version PR fails lint.
      # Publishing authenticates via the npm Trusted Publisher configured for
      # this repo + workflow (no NPM_TOKEN); provenance is attested by OIDC.
      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # All v1 runtime deps are pure-JS, so a single-file binary per OS/arch is viable.
      - run: pnpm --filter okapi-okf run build:binaries
      - uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/binaries/*
          tag_name: v${{ github.run_number }}
